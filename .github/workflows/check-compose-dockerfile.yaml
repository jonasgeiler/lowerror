name: Check Compose Dockerfile

on:
  push:
    branches:
      - main
      - 'renovate/**'
    paths: &paths
      - compose.Dockerfile

      - .github/workflows/check-compose-dockerfile.ya?ml

  pull_request:
    branches:
      - main
    paths: *paths

  workflow_dispatch:
  workflow_call:

jobs:
  build: #######################################################################
    name: Build

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -euxo pipefail {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Build Compose Docker image
        run: docker build . --file=compose.Dockerfile
