name: Check GoReleaser

on:
  push:
    branches:
      - main
      - 'renovate/**'
    paths: &paths
      - .goreleaser.yaml
      - .goreleaser.Dockerfile

      - .github/workflows/check-goreleaser.ya?ml

  pull_request:
    branches:
      - main
    paths: *paths

  workflow_dispatch:
  workflow_call:
    inputs:
      skip-snapshot-release:
        required: false
        default: false
        type: boolean

jobs:
  code-quality: ################################################################
    name: Code Quality

    runs-on: ubuntu-slim
    defaults:
      run:
        shell: bash --noprofile --norc -euxo pipefail {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        env:
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          GORELEASER_VERSION: v2.16.0
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: check

  snapshot-release: ############################################################
    name: Snapshot Release
    if: inputs.skip-snapshot-release != true

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -euxo pipefail {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0 # Important for GoReleaser to get the full git history.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Use the Go version specified in the go.mod file.
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        env:
          # renovate: datasource=docker depName=tonistiigi/binfmt
          TONISTIIGI_BINFMT_VERSION: qemu-v10.1.3
        with:
          image: tonistiigi/binfmt:${{ env.TONISTIIGI_BINFMT_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        env:
          # renovate: datasource=github-releases depName=docker/buildx
          DOCKER_BUILDX_VERSION: v0.33.0
          # renovate: datasource=docker depName=moby/buildkit
          MOBY_BUILDKIT_VERSION: v0.29.0
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          driver-opts: image=moby/buildkit:${{ env.MOBY_BUILDKIT_VERSION }}

      - name: Do snapshot release
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        env:
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          GORELEASER_VERSION: v2.16.0
          GITHUB_TOKEN: ${{ github.token }}
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --snapshot
