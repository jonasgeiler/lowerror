name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  pre-check-dockerfiles: #######################################################
    name: Pre-Check Dockerfiles
    uses: ./.github/workflows/check-dockerfiles.yaml

  pre-check-github-actions-workflows: ##########################################
    name: Pre-Check GitHub Actions Workflows
    uses: ./.github/workflows/check-github-actions-workflows.yaml

  pre-check-goreleaser: ########################################################
    name: Pre-Check GoReleaser
    uses: ./.github/workflows/check-goreleaser.yaml
    with:
      skip-snapshot-release: true

  release: #####################################################################
    name: Release
    needs:
      - pre-check-dockerfiles
      - pre-check-github-actions-workflows
      - pre-check-goreleaser

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -euxo pipefail {0}

    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          # GoReleaser needs the full git history to work properly.
          fetch-depth: 0

      - name: Set up SOURCE_DATE_EPOCH for reproducible builds
        run: |
          commit_timestamp="$(git show --no-patch --format=%ct "${GITHUB_SHA}")"
          echo "SOURCE_DATE_EPOCH=${commit_timestamp}" >> "${GITHUB_ENV}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Use the Go version specified in the go.mod file.
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        env:
          # renovate: datasource=docker depName=tonistiigi/binfmt
          TONISTIIGI_BINFMT_VERSION: qemu-v10.1.3
        with:
          image: tonistiigi/binfmt:${{ env.TONISTIIGI_BINFMT_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        env:
          # renovate: datasource=github-releases depName=docker/buildx
          DOCKER_BUILDX_VERSION: v0.33.0
          # renovate: datasource=docker depName=moby/buildkit
          MOBY_BUILDKIT_VERSION: v0.29.0
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          driver-opts: image=moby/buildkit:${{ env.MOBY_BUILDKIT_VERSION }}

      - name: Log in to Docker Hub Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hardened Images Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: dhi.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Release the new version
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        env:
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          GORELEASER_VERSION: v2.16.0
          GITHUB_TOKEN: ${{ github.token }}
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release

      - name: Attest checksums
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/sha256-checksums.txt

      - name: Attest Docker digests
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/docker-digests.txt
